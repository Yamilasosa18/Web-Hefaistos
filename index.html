<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hefaistos | Herrería & Construcción</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #000000 0%, #1c1c22 60%, #401a00 100%);
            background-attachment: fixed;
            color: #f5f5f7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        .top-bar {
            background-color: #000000;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #333;
        }
        .top-bar a { color: #d1d1d6; text-decoration: none; margin: 0 10px; }
        header { background-color: #000000; padding: 30px 20px 20px 20px; text-align: center; }
        .linea-degrade { height: 4px; width: 100%; background: linear-gradient(90deg, #e65c00, #a84500); }
        .logo-container img { max-width: 260px; height: auto; pointer-events: none; }
        
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        h2 { color: #e65c00; border-left: 4px solid #e65c00; padding-left: 10px; }
        
        /* Estilo para la nueva imagen */
        .featured-img {
            width: 100%;
            border-radius: 8px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; }
        .card { background-color: rgba(17, 17, 21, 0.85); border-radius: 12px; overflow: hidden; border: 1px solid #2a2a35; }
        .card img { width: 100%; height: 220px; object-fit: cover; pointer-events: none; }
        .card-content { padding: 20px; }
        .card-content h3 { color: #e65c00; margin-top: 0; }
        .card-content p { color: #d1d1d6; font-size: 14px; line-height: 1.5; }
        
        footer { text-align: center; padding: 40px 20px; color: #666666; background-color: #000000; margin-top: 60px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="tel:+59800000000"><i class="fas fa-phone"></i> Celular</a> |
        <a href="https://facebook.com/tuperfil"><i class="fab fa-facebook"></i> Facebook</a> |
        <a href="mailto:tuemail@ejemplo.com"><i class="fas fa-envelope"></i> Email</a>
    </div>

    <header>
        <div class="logo-container">
            <img src="83727.png" alt="Logo HEFAISTOS">
        </div>
    </header>
    <div class="linea-degrade"></div>

    <div class="container">
        <h2>Proyectos Destacados</h2>
        
        <!-- Aquí se inserta la imagen solicitada -->
        <img src="20260322_095141.jpg" alt="Proyecto Hefaistos Destacado" class="featured-img">

        
        <div class="grid">
            <div class="card">
                <img src="https://via.placeholder.com/400x250?text=Trabajo+1" alt="Proyecto">
                <div class="card-content">
                    <h3>Estructuras Metálicas</h3>
                    <p>Diseño y montaje de alta resistencia con acabados profesionales.</p>
                </div>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/400x250?text=Trabajo+2" alt="Proyecto">
                <div class="card-content">
                    <h3>Herrería de Obra</h3>
                    <p>Portones y cerramientos a medida con técnicas de forja.</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 HEFAISTOS Herrería & Construcción.</p>
    </footer>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
